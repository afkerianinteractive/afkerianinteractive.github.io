        - generic [ref=f8e82]: Studio
        - heading "Who we are." [level=2] [ref=f8e83]
      - generic [ref=f8e84]:
        - paragraph [ref=f8e85]: "AFKERIAN INTERACTIVE is an independent studio that builds mobile games and utility apps. Our four titles cover different genres: a grid-based strategy game, a two-player arcade game, a rhythm game, and QR Decoder, a document and scanning utility with text recognition built into the app."
        - paragraph [ref=f8e86]: "Every title follows the same approach: keep core features working on the device itself, collect as little information as possible, and say plainly which third-party services handle things like advertising, analytics, or crash reporting."
    - generic [ref=f8e88]:
      - generic [ref=f8e89]:
        - generic [ref=f8e90]: Principles
        - heading "How we build." [level=2] [ref=f8e91]
      - generic [ref=f8e92]:
        - generic [ref=f8e95]:
          - heading "Creativity" [level=3] [ref=f8e96]
          - paragraph [ref=f8e97]: Strategy, two-player arcade, and rhythm games, all from one studio. We would rather build different things well than repeat one formula four times.
        - generic [ref=f8e100]:
          - heading "Runs on your device" [level=3] [ref=f8e101]
          - paragraph [ref=f8e102]: Core gameplay and utility features are designed to run directly on your phone, including the document text recognition in QR Decoder, which uses Google ML Kit locally instead of sending images to a server.
        - generic [ref=f8e105]:
          - heading "Privacy" [level=3] [ref=f8e106]
          - paragraph [ref=f8e107]: You do not need to create an account, and we do not directly collect your name or address. Anything a third-party SDK processes is explained plainly in each Privacy Policy.
        - generic [ref=f8e110]:
          - heading "Performance" [level=3] [ref=f8e111]
          - paragraph [ref=f8e112]: Nothing waits on a network round trip. Scanning, gameplay, and progress all run locally, so there is no live cloud dependency slowing things down.
        - generic [ref=f8e115]:
          - heading "Transparency" [level=3] [ref=f8e116]
          - paragraph [ref=f8e117]: Every title publishes its Privacy Policy, Terms, and third-party notices in the open, reachable from this site in a couple of clicks.
